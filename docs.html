  <!-- highlight.js theme (github-dark) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700;800&display=swap');

    /* ── Reset + tokens (matched to index.html) ──
       Override any --var below in your own <style> to re-skin per site. */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    :root {
      --gold:   #FFD700;
      --pink:   #FF69B4;
      --cyan:   #00FFFF;
      --green:  #50fa7b;
      --purple: #bd93f9;
      --bg:     #0a0a0f;
      --bg2:    #0f1020;
      --card:   rgba(15, 16, 40, 0.7);
      --border: rgba(255,215,0,0.15);
      --text:   rgba(255,255,255,0.88);
      --dim:    rgba(255,255,255,0.55);
      --mono:   'JetBrains Mono', 'Fira Code', monospace;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ── Starfield background (matched) ── */
    .starfield {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse at 50% -10%, #1a1a3e 0%, #0d0d1f 40%, #0a0a0f 100%);
    }
    .stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(2px 2px at 20px 30px,  rgba(255,215,0,0.9),  transparent),
        radial-gradient(2px 2px at 40px 70px,  rgba(0,255,255,0.7),  transparent),
        radial-gradient(1px 1px at 90px 40px,  rgba(255,255,255,0.9),transparent),
        radial-gradient(1px 1px at 130px 80px, rgba(255,105,180,0.8),transparent),
        radial-gradient(2px 2px at 160px 30px, rgba(255,255,255,0.6),transparent),
        radial-gradient(1px 1px at 70px 55px,  rgba(189,147,249,0.7),transparent);
      background-repeat: repeat; background-size: 200px 100px;
      animation: starscroll 100s linear infinite;
    }
    .stars:nth-child(2) { background-size: 270px 130px; animation-duration: 145s; animation-direction: reverse; opacity: .7; }
    .stars:nth-child(3) { background-size: 340px 165px; animation-duration: 190s; opacity: .45; }
    @keyframes starscroll {
      from { transform: translateX(0) translateY(0); }
      to   { transform: translateX(-200px) translateY(-100px); }
    }

    /* ── Sticky nav (matched) ── */
    .site-nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(10, 10, 20, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,215,0,0.12);
    }
    .nav-inner {
      display: flex; justify-content: space-between; align-items: center;
      max-width: 1280px; margin: 0 auto; padding: .75rem 2rem;
    }
    .nav-logo {
      font-family: var(--mono); font-weight: 700; font-size: 1.25rem;
      color: var(--gold); text-decoration: none; letter-spacing: -.5px;
    }
    .nav-logo span { color: var(--cyan); }
    .nav-links { display: flex; list-style: none; gap: 1.4rem; align-items: center; }
    .nav-links a {
      color: var(--dim); text-decoration: none; font-size: .875rem;
      font-weight: 500; transition: color .2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-cta {
      background: linear-gradient(135deg, var(--gold), var(--pink));
      color: #000 !important; padding: .45rem 1.2rem; border-radius: 6px;
      font-weight: 700 !important; font-size: .85rem !important;
    }
    .nav-cta:hover { opacity: .85; }
    .menu-toggle {
      display: none; background: none; border: 1px solid rgba(255,215,0,.25);
      color: var(--gold); border-radius: 6px; padding: .3rem .6rem; cursor: pointer;
      font-size: 1.1rem; font-family: var(--mono);
    }
    @media (max-width: 900px) {
      .nav-links { display: none; }
      .menu-toggle { display: inline-block; }
    }

    /* ── Docs layout ── */
    .docs-shell {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      max-width: 1280px; margin: 0 auto;
      gap: 0; position: relative;
    }
    /* Backdrop is a mobile-only overlay — MUST stay out of the grid flow on all
       widths, else it renders as a block grid item on desktop and steals column 1,
       squishing the doc pane into the sidebar width. */
    .sidebar-backdrop {
      display: none; position: fixed; inset: 57px 0 0 0; z-index: 140;
      background: rgba(0,0,0,.5);
    }

    /* Sidebar */
    .docs-sidebar {
      position: sticky; top: 57px; align-self: start;
      height: calc(100vh - 57px); overflow-y: auto;
      padding: 1.5rem 1rem 3rem;
      border-right: 1px solid rgba(255,215,0,.1);
    }
    .sidebar-title {
      font-family: var(--mono); font-size: .72rem; letter-spacing: .12em;
      text-transform: uppercase; color: var(--cyan); margin: .5rem .5rem 1rem;
      display: flex; align-items: center; gap: .4rem;
    }
    .doc-nav { list-style: none; display: flex; flex-direction: column; gap: .15rem; }
    .doc-nav a {
      display: block; text-decoration: none; color: var(--dim);
      font-size: .84rem; line-height: 1.35; padding: .5rem .65rem;
      border-radius: 8px; border-left: 2px solid transparent;
      transition: background .15s, color .15s, border-color .15s;
    }
    .doc-nav a:hover { background: rgba(255,215,0,.05); color: var(--text); }
    .doc-nav a.active {
      background: linear-gradient(90deg, rgba(0,255,255,.1), rgba(189,147,249,.05));
      color: #fff; border-left-color: var(--cyan);
    }
    .doc-nav a .doc-file {
      display: block; font-family: var(--mono); font-size: .68rem;
      color: rgba(255,255,255,.3); margin-top: .15rem;
    }
    .sidebar-src {
      margin: 1.5rem .5rem 0; padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,.07);
      font-size: .72rem; color: var(--dim);
    }
    .sidebar-src a { color: var(--cyan); text-decoration: none; }
    .sidebar-src a:hover { color: var(--gold); }
    .src-status { font-family: var(--mono); font-size: .66rem; color: rgba(255,255,255,.3); margin-top: .4rem; }

    /* Main content */
    .docs-main { padding: 1.5rem 2.5rem 5rem; min-width: 0; }
    .doc-back {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .82rem; color: var(--dim); text-decoration: none;
      margin-bottom: 1.25rem; transition: color .2s;
    }
    .doc-back:hover { color: var(--gold); }
    .doc-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
      padding-bottom: 1rem; border-bottom: 1px solid rgba(255,215,0,.1);
    }
    .doc-toolbar .doc-path { font-family: var(--mono); font-size: .74rem; color: var(--dim); }
    .doc-toolbar .doc-path a { color: var(--cyan); text-decoration: none; }
    .doc-toolbar .doc-path a:hover { color: var(--gold); }
    .doc-actions { display: flex; gap: .6rem; }
    .doc-actions a {
      font-family: var(--mono); font-size: .72rem; text-decoration: none;
      color: var(--dim); border: 1px solid rgba(255,255,255,.12);
      padding: .3rem .7rem; border-radius: 6px; transition: all .2s;
    }
    .doc-actions a:hover { color: var(--gold); border-color: rgba(255,215,0,.35); }

    /* Rendered markdown */
    .markdown-body { font-size: .95rem; line-height: 1.75; }
    .markdown-body > *:first-child { margin-top: 0; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3,
    .markdown-body h4, .markdown-body h5, .markdown-body h6 {
      line-height: 1.25; font-weight: 700; scroll-margin-top: 72px;
      margin: 2rem 0 1rem;
    }
    .markdown-body h1 {
      font-size: 2rem; margin-top: 0;
      background: linear-gradient(140deg, var(--gold) 0%, var(--pink) 45%, var(--cyan) 90%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      padding-bottom: .3rem;
    }
    .markdown-body h2 {
      font-size: 1.5rem; color: #fff;
      border-bottom: 1px solid rgba(255,215,0,.12); padding-bottom: .35rem;
    }
    .markdown-body h3 { font-size: 1.2rem; color: var(--gold); }
    .markdown-body h4 { font-size: 1.02rem; color: var(--cyan); }
    .markdown-body h5, .markdown-body h6 { font-size: .92rem; color: var(--pink); }
    .markdown-body a { color: var(--cyan); text-decoration: none; border-bottom: 1px solid rgba(0,255,255,.25); }
    .markdown-body a:hover { color: var(--gold); border-bottom-color: var(--gold); }
    .markdown-body p, .markdown-body ul, .markdown-body ol, .markdown-body blockquote { margin-bottom: 1rem; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.5rem; }
    .markdown-body li { margin-bottom: .35rem; }
    .markdown-body li::marker { color: var(--gold); }
    .markdown-body strong { color: rgba(255,255,255,.95); }
    .markdown-body em { color: var(--purple); font-style: italic; }
    .markdown-body blockquote {
      border-left: 3px solid var(--cyan); background: rgba(0,255,255,.04);
      padding: .6rem 1rem; border-radius: 0 8px 8px 0; color: rgba(255,255,255,.75);
    }
    .markdown-body hr { border: none; border-top: 1px solid rgba(255,215,0,.12); margin: 2rem 0; }
    /* inline code */
    .markdown-body :not(pre) > code {
      font-family: var(--mono); font-size: .84em;
      background: rgba(0,0,0,.45); color: var(--gold);
      padding: .12rem .4rem; border-radius: 5px;
      border: 1px solid rgba(255,215,0,.15);
    }
    /* code blocks */
    .markdown-body pre {
      background: #050508 !important; border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 1.1rem 1.25rem; overflow-x: auto;
      margin-bottom: 1.25rem; box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }
    .markdown-body pre code {
      font-family: var(--mono); font-size: .82rem; line-height: 1.6;
      background: none !important; padding: 0; border: none;
    }
    /* tables */
    .markdown-body table {
      border-collapse: collapse; width: 100%; margin-bottom: 1.25rem;
      font-size: .85rem; display: block; overflow-x: auto;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid rgba(255,255,255,.1); padding: .5rem .8rem; text-align: left;
    }
    .markdown-body th { background: rgba(255,215,0,.06); color: var(--gold); font-family: var(--mono); font-size: .78rem; }
    .markdown-body tr:nth-child(even) td { background: rgba(255,255,255,.02); }
    .markdown-body img { max-width: 100%; border-radius: 8px; }
    /* mermaid */
    .markdown-body .mermaid {
      background: rgba(0,0,0,.35); border: 1px solid rgba(0,255,255,.18);
      border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem;
      text-align: center; overflow-x: auto;
    }

    /* Loading / error states */
    .doc-status {
      padding: 3rem 1rem; text-align: center; color: var(--dim); font-family: var(--mono); font-size: .9rem;
    }
    .doc-status .spinner {
      display: inline-block; width: 1.4rem; height: 1.4rem; margin-right: .6rem;
      border: 2px solid rgba(0,255,255,.25); border-top-color: var(--cyan);
      border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .doc-error { color: var(--pink); }
    .doc-error a { color: var(--cyan); }

    /* Footer */
    .site-footer {
      padding: 2rem 0; border-top: 1px solid rgba(255,215,0,.12);
      background: rgba(0,0,0,.4); margin-top: 2rem;
    }
    .footer-copy {
      font-family: var(--mono); font-size: .78rem;
      color: rgba(255,255,255,.3); text-align: center;
    }
    .footer-copy span { color: var(--gold); }
    .footer-copy a { color: var(--dim); text-decoration: none; }
    .footer-copy a:hover { color: var(--gold); }

    /* Mobile sidebar */
    @media (max-width: 900px) {
      .docs-shell { grid-template-columns: 1fr; }
      .docs-sidebar {
        position: fixed; top: 57px; left: 0; z-index: 150;
        width: 82%; max-width: 320px; height: calc(100vh - 57px);
        background: rgba(10,10,20,.98); backdrop-filter: blur(18px);
        border-right: 1px solid rgba(255,215,0,.15);
        transform: translateX(-102%); transition: transform .25s ease;
      }
      .docs-sidebar.open { transform: translateX(0); }
      .docs-main { padding: 1.25rem 1.1rem 4rem; }
      .sidebar-backdrop {
        display: none; position: fixed; inset: 57px 0 0 0; z-index: 140;
        background: rgba(0,0,0,.5);
      }
      .sidebar-backdrop.show { display: block; }
    }
  </style>
</head>

  <!-- DOCS SHELL -->
  <div class="docs-shell">

    <!-- Sidebar -->

    <!-- Main -->
    <main class="docs-main">

  <!-- FOOTER -->

      <a id="footerRepo" href="#" target="_blank" rel="noopener"></a>
      · Built with 🐧 by King Divad &amp; Lumina
    </p>
  </footer>

  <!-- CDN libraries -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>

  <script>
  (function () {
    "use strict";

    /* ════════════════ CONFIG — the only lines a new site must set ════════════════
       Adopting a site = set REPO (+ BRANCH if not "main"). Everything else derives. */
    const REPO        = "smilinTux/skwhisper";  // public GitHub repo the docs live in
    const BRANCH      = "main";                // branch to render from
    const DOCS_PATH   = "docs";                // folder in the repo holding *.md
    const DEFAULT_DOC = "PROVENANCE_AND_CLOSURE_DESIGN.md"; // doc shown when no ?doc= param
    const SITE_LABEL  = "skwhisper";            // used in <title> and status text
    /* ═════════════════════════════════════════════════════════════════════════════ */

    const API_LIST   = `https://api.github.com/repos/${REPO}/contents/${DOCS_PATH}`;
    const RAW_BASE   = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${DOCS_PATH}/`;
    const HTML_BASE  = `https://github.com/${REPO}/blob/${BRANCH}/${DOCS_PATH}/`;
    const TREE_URL   = `https://github.com/${REPO}/tree/${BRANCH}/${DOCS_PATH}`;
    const REPO_URL   = `https://github.com/${REPO}`;
    const MANIFEST   = "docs-manifest.json";

    const els = {
      nav:       document.getElementById("docNav"),
      content:   document.getElementById("docContent"),
      path:      document.getElementById("docPath"),
      actions:   document.getElementById("docActions"),
      srcStatus: document.getElementById("srcStatus"),
      srcLink:   document.getElementById("srcLink"),
      footerRepo:document.getElementById("footerRepo"),
      sidebar:   document.getElementById("docsSidebar"),
      backdrop:  document.getElementById("sidebarBackdrop"),
      toggle:    document.getElementById("menuToggle"),
    };

    // Wire the source/footer links from config (keeps template DRY)
    if (els.srcLink)    { els.srcLink.href = TREE_URL; els.srcLink.textContent = `${REPO} · ${DOCS_PATH}/`; }
    if (els.footerRepo) { els.footerRepo.href = REPO_URL; els.footerRepo.textContent = `github.com/${REPO}`; }

    let DOCS = [];   // [{name, title}]

    // Configure mermaid (dark, SKWorld palette-ish)
    if (window.mermaid) {
      mermaid.initialize({
        startOnLoad: false,
        theme: "dark",
        securityLevel: "strict",
        themeVariables: {
          primaryColor: "#0f1020",
          primaryTextColor: "#ffffff",
          primaryBorderColor: "#00FFFF",
          lineColor: "#FFD700",
          fontFamily: "'JetBrains Mono', monospace",
        },
      });
    }

    if (window.marked) {
      marked.setOptions({ gfm: true, breaks: false });
    }

    // ── helpers ──────────────────────────────
    function prettify(name) {
      return name.replace(/\.mdx?$/i, "").replace(/[_-]+/g, " ")
                 .replace(/\b\w/g, c => c.toUpperCase());
    }
    function slugify(text) {
      return String(text).toLowerCase().trim()
        .replace(/[^\w\s-]/g, "").replace(/[\s_]+/g, "-").replace(/-+/g, "-");
    }
    function getParam() {
      const p = new URLSearchParams(location.search).get("doc");
      return p && /^[\w.-]+\.mdx?$/i.test(p) ? p : null;
    }

    // ── load the doc list (API → manifest fallback) ──
    async function loadIndex() {
      try {
        const res = await fetch(API_LIST, { headers: { "Accept": "application/vnd.github+json" } });
        if (!res.ok) throw new Error("API " + res.status);
        const data = await res.json();
        DOCS = data
          .filter(x => x.type === "file" && /\.mdx?$/i.test(x.name))
          .map(x => ({ name: x.name, title: prettify(x.name) }));
        // Enrich with manifest titles if available (nicer labels)
        await mergeManifestTitles();
        setSrcStatus("live · GitHub API");
      } catch (err) {
        // Fallback to committed manifest (survives GitHub API rate limits)
        try {
          const res = await fetch(MANIFEST, { cache: "no-cache" });
          const man = await res.json();
          DOCS = man.docs.map(d => ({ name: d.name, title: d.title || prettify(d.name) }));
          setSrcStatus("fallback · committed manifest (API: " + (err.message || "unavailable") + ")");
        } catch (e2) {
          els.nav.innerHTML = '<li class="doc-status doc-error">Could not load the doc index.</li>';
          setSrcStatus("offline");
          return;
        }
      }
      renderNav();
      // Robust default: if the initial doc isn't in the list, render the first one.
      if (DOCS.length && !DOCS.some(d => d.name === currentDoc)) {
        renderDoc(DOCS[0].name);
      }
    }

    async function mergeManifestTitles() {
      try {
        const res = await fetch(MANIFEST, { cache: "no-cache" });
        if (!res.ok) return;
        const man = await res.json();
        const byName = {};
        (man.docs || []).forEach(d => { byName[d.name] = d.title; });
        // Reorder DOCS to manifest order (curated), append any API-only extras
        const ordered = [];
        (man.docs || []).forEach(d => {
          const hit = DOCS.find(x => x.name === d.name);
          if (hit) { hit.title = d.title || hit.title; ordered.push(hit); }
        });
        DOCS.forEach(x => { if (!ordered.includes(x)) ordered.push(x); });
        DOCS = ordered;
        DOCS.forEach(x => { if (byName[x.name]) x.title = byName[x.name]; });
      } catch (_) { /* ignore */ }
    }

    function setSrcStatus(txt) { els.srcStatus.textContent = txt; }

    function renderNav() {
      els.nav.innerHTML = "";
      DOCS.forEach(doc => {
        const li = document.createElement("li");
        const a  = document.createElement("a");
        a.href = "?doc=" + encodeURIComponent(doc.name);
        a.dataset.doc = doc.name;
        a.innerHTML = "";
        const t = document.createElement("span");
        t.textContent = doc.title;
        const f = document.createElement("span");
        f.className = "doc-file";
        f.textContent = doc.name;
        a.appendChild(t); a.appendChild(f);
        a.addEventListener("click", (e) => {
          e.preventDefault();
          navigateTo(doc.name);
          closeSidebar();
        });
        li.appendChild(a);
        els.nav.appendChild(li);
      });
      highlightActive(currentDoc);
    }

    function highlightActive(name) {
      els.nav.querySelectorAll("a").forEach(a => {
        a.classList.toggle("active", a.dataset.doc === name);
      });
    }

    // ── render a document ────────────────────
    let currentDoc = null;

    async function renderDoc(name) {
      currentDoc = name;
      highlightActive(name);
      updateToolbar(name);
      document.title = prettify(name) + " — " + SITE_LABEL + " docs";
      els.content.innerHTML = '<div class="doc-status"><span class="spinner"></span>Loading document…</div>';

      let md;
      try {
        const res = await fetch(RAW_BASE + name, { cache: "no-cache" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        md = await res.text();
      } catch (err) {
        els.content.innerHTML =
          '<div class="doc-status doc-error">Failed to load <code>' + name + '</code> (' +
          (err.message || "error") + ').<br>Try the <a href="' + HTML_BASE + name +
          '" target="_blank" rel="noopener">source on GitHub</a>.</div>';
        return;
      }

      // 1) markdown → HTML
      const rawHtml = marked.parse(md);
      // 2) sanitize (allow class attrs, which DOMPurify keeps by default)
      const clean = DOMPurify.sanitize(rawHtml, { ADD_ATTR: ["target"] });
      // 3) insert
      els.content.innerHTML = clean;

      // 4) heading anchors for #hash deep-linking
      const seen = {};
      els.content.querySelectorAll("h1,h2,h3,h4,h5,h6").forEach(h => {
        if (h.id) return;
        let slug = slugify(h.textContent) || "section";
        if (seen[slug] != null) { seen[slug]++; slug = slug + "-" + seen[slug]; }
        else seen[slug] = 0;
        h.id = slug;
      });

      // 5) mermaid: convert code.language-mermaid → div.mermaid, then render
      const mermaidNodes = [];
      els.content.querySelectorAll("code.language-mermaid, code.lang-mermaid").forEach(code => {
        const div = document.createElement("div");
        div.className = "mermaid";
        div.textContent = code.textContent;
        const pre = code.closest("pre") || code;
        pre.replaceWith(div);
        mermaidNodes.push(div);
      });
      if (mermaidNodes.length && window.mermaid) {
        try { await mermaid.run({ nodes: mermaidNodes }); }
        catch (e) { console.warn("mermaid render error", e); }
      }

      // 6) highlight remaining code blocks
      els.content.querySelectorAll("pre code").forEach(block => {
        if (block.classList.contains("language-mermaid")) return;
        try { hljs.highlightElement(block); } catch (_) {}
      });

      // 7) make external links open in a new tab
      els.content.querySelectorAll('a[href^="http"]').forEach(a => {
        a.target = "_blank"; a.rel = "noopener";
      });

      // 8) scroll to #hash anchor if present
      if (location.hash) {
        const target = document.getElementById(location.hash.slice(1));
        if (target) target.scrollIntoView();
        else window.scrollTo(0, 0);
      } else {
        window.scrollTo(0, 0);
      }
    }

    function updateToolbar(name) {
      els.path.innerHTML = DOCS_PATH + ' / <a href="' + HTML_BASE + name +
        '" target="_blank" rel="noopener">' + name + "</a>";
      els.actions.innerHTML =
        '<a href="' + RAW_BASE + name + '" target="_blank" rel="noopener">Raw</a>' +
        '<a href="' + HTML_BASE + name + '" target="_blank" rel="noopener">View on GitHub ↗</a>';
    }

    // ── routing ──────────────────────────────
    function navigateTo(name, hash) {
      const url = "?doc=" + encodeURIComponent(name) + (hash || "");
      history.pushState({ doc: name }, "", url);
      renderDoc(name);
    }

    window.addEventListener("popstate", () => {
      const name = getParam() || DEFAULT_DOC;
      renderDoc(name);
    });

    // Mobile sidebar
    function openSidebar()  { els.sidebar.classList.add("open");  els.backdrop.classList.add("show"); }
    function closeSidebar() { els.sidebar.classList.remove("open"); els.backdrop.classList.remove("show"); }
    els.toggle.addEventListener("click", () => {
      els.sidebar.classList.contains("open") ? closeSidebar() : openSidebar();
    });
    els.backdrop.addEventListener("click", closeSidebar);

    // ── boot ─────────────────────────────────
    const initialDoc = getParam() || DEFAULT_DOC;
    currentDoc = initialDoc;
    loadIndex();
    renderDoc(initialDoc);
  })();
  </script>

</body>
</html>
