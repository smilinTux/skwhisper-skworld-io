<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif}
.og{width:1200px;height:630px;position:relative;background:radial-gradient(ellipse at 30% 20%,#161033 0%,#0a0a1e 45%,#060612 100%);display:flex;flex-direction:column;justify-content:center;padding:0 90px;color:#fff}
.icon{font-size:130px;line-height:1;margin-bottom:18px;filter:drop-shadow(0 0 50px rgba(123,104,238,0.7))}
h1{font-size:118px;font-weight:800;letter-spacing:-2px;line-height:1;background:linear-gradient(120deg,#7b68ee,#00bcd4 60%,#7b68ee 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
.sub{font-size:40px;font-weight:600;color:rgba(255,255,255,0.82);margin-bottom:26px}
.tag{font-size:30px;font-style:italic;color:#7b68ee;border-left:5px solid rgba(123,104,238,0.5);padding-left:22px;line-height:1.35;max-width:900px}
.foot{position:absolute;bottom:46px;left:90px;right:90px;display:flex;justify-content:space-between;align-items:center}
.url{font-family:'JetBrains Mono',monospace;font-size:26px;color:#00bcd4}
.brand{font-family:'JetBrains Mono',monospace;font-size:24px;color:#ffd700}
</style></head><body><div class="og">
<div class="icon">💭</div><h1>SKWhisper</h1><div class="sub">The subconscious layer of sovereign AI. Not storage — thought.</div>
<div class="tag">"The process of building the agent is building me."</div>
<div class="foot"><span class="url">skwhisper.skworld.io</span><span class="brand">🐧 SKWorld</span></div>
</div></body></html>
